repos:
  - repo: local
    hooks:
      - id: isort
        name: isort (uv)
        entry: uv run --project core python -m isort
        language: system
        types: [python]
        pass_filenames: true
        args: [--settings-path=core/pyproject.toml]

      - id: pycln
        name: pycln
        entry: uv run --project core python -m pycln
        language: system
        types: [python]
        pass_filenames: true
        args: [--config=core/pyproject.toml, --all]

      - id: test
        name: pytest (core)
        entry: uv run --directory core python -m pytest -x
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: tsc-web
        name: TypeScript (web)
        entry: npm exec --prefix web/packages/app -- tsc --noEmit -p web/packages/app
        language: system
        pass_filenames: false
        files: ^web/packages/app/
        stages: [pre-commit]

      - id: next-lint-web
        name: next lint (web)
        entry: npm run lint --prefix web/packages/app
        language: system
        pass_filenames: false
        files: ^web/packages/app/
        stages: [pre-commit]

      - id: jest-web
        name: jest (web)
        entry: npm test --prefix web/packages/app
        language: system
        pass_filenames: false
        files: ^web/packages/app/
        stages: [pre-commit]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        language: system
        entry: uv run --project core ruff check
        args: [--fix]
      - id: ruff-format
        language: system
        entry: uv run --project core ruff format
