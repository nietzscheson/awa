name: Main branch

on:
  push:
    branches: [main]

concurrency:
  group: main-${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: pycln (unused imports)
        run: uv run pycln --config pyproject.toml --check --all src tests

      - name: isort
        run: uv run isort src tests --check-only --diff

      - name: Pytest
        run: uv run pytest
